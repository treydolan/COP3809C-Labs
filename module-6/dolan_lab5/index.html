<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octagon</title>
<link rel="stylesheet" type="text/css" href="css/octagonstyle.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script><!--needed for jquery mobile-->
<script src="https://ajax.googleapis.com/ajax/libs/jquerymobile/1.4.5/jquery.mobile.min.js"></script><!-- jquery mobile-->
<script type="text/javascript">$(document).bind("mobileinit", function(){$.extend(  $.mobile , {autoInitializePage: false})});</script>
	<!--needed for jquery mobile-->

<script src="js/octagon_code.js"></script>

<!--link to lightbox styles-->

<link href="lightbox/src/css/lightbox.css" rel="stylesheet">
</head>

<body>
<div id="container">
  <header>
    <h1>3D CSS Interface</h1>
    <h2>Swipe!</h2>
  </header>
  <div id="parent_of_myoct">
    <div id="left_arrow"></div>
    <div id="right_arrow"></div>
    <div id="myoct">
		
      <div class="side eighth"></div>
      <div class="side seventh"></div>
      <div class="side sixth"></div>
      <div class="side fifth"></div>
      <div class="side fourth"></div>
      <div class="side third"></div>
      <div class="side second"></div>
      <div class="side first"></div>
		
      <p class="side eighthText">Art 8<br>
      <a href="oct_images/the-new-york-public-library-a0h_2LjU5KQ-unsplash.jpg"
      data-lightbox="myart" data-title="Moonlit Landscape"></a></p>

      <p class="side seventhText">Art 7<br>
      <a href="oct_images/rick-rothenberg-KNDd8LcVHDY-unsplash.jpg"
      data-lightbox="myart" data-title="Abstract Blue Metal"></a></p>

      <p class="side sixthText">Art 6<br>
      <a href="oct_images/david-goulding-oanz-c6Bi5o-unsplash.jpg"
      data-lightbox="myart" data-title="Liquid Bouquet"></a></p>

      <p class="side fifthText">Art 5<br>
      <a href="oct_images/europeana-Agwv1mKDUnc-unsplash.jpg"
      data-lightbox="myart" data-title="Still Life with Violin"></a></p>

      <p class="side fourthText">Art 4<br>
      <a href="oct_images/henrik-donnestad-HO1Evlp1p1o-unsplash.jpg"
      data-lightbox="myart" data-title="Arctic Texture"></a></p>

      <p class="side thirdText">Art 3<br>
      <a href="oct_images/henrik-donnestad-Mc_Eh0mrh7c-unsplash.jpg"
      data-lightbox="myart" data-title="Ocean Rush"></a></p>

      <p class="side secondText">Art 2<br>
      <a href="oct_images/henrik-donnestad-uG6R6Hl-L74-unsplash.jpg"
      data-lightbox="myart" data-title="Blue Flow"></a></p>

      <p class="side firstText">Art 1<br>
      <a href="oct_images/markus-spiske-cn0-hgcpoL8-unsplash.jpg"
      data-lightbox="myart" data-title="Colorful Chaos"></a></p>
		
    </div>
    <!--end myoct--> 
  </div>
  <!--end parent myoct-->
  
  <footer>
    <p>This is an example of an interface, constructed entirely of HTML, CSS and Javascript. Navigate by swiping, arrows  or keyboard arrows.</p>
  </footer>
</div>
<!--end container--> 
<script src="lightbox/src/js/lightbox.js"></script> 
<script>
    lightbox.option({
      'wrapAround': true,
		'disableScrolling':true,
		alwaysShowNavOnTouchDevices:true
		
    })
</script>
</body>
</html>
